# ============================================================
# Docker Compose - WebFestival DB (Desarrollo Local)
# Levanta PostgreSQL + Redis para desarrollo en Mac/Linux
# sin necesidad de instalar nada localmente.
#
# Uso:
#   cd webfestival-db
#   cp .env.example .env
#   docker compose up -d
#
# Conexión desde la API local (npm run dev):
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/webfestival
#   REDIS_URL=redis://:password@localhost:6379
# ============================================================

services:

  # ──────────────────────────────────────────────
  # POSTGRESQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wf-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-webfestival}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"   # Expuesto para acceso local desde la API
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webfestival}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # REDIS
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wf-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-wf_redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"   # Expuesto para acceso local desde la API
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-wf_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
