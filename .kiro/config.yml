# ==========================================================
# 🧠 CONFIGURACIÓN DE IA PARA KIRO IDE
# ==========================================================
inclusion: always
version: 1.3.0
type: ai-config
description: >
  Configuración oficial para el asistente de IA de Kiro IDE.
  Define reglas de idioma, documentación, convenciones de código,
  comportamiento de testing y control de autofix.

# ==========================================================
# 🪪 METADATOS DEL PROYECTO
# ==========================================================
metadata:
  project_name: "Sistema de Notificaciones Automatizadas"
  project_code: "SNA-CORE"
  organization: "TechLabs Solutions"
  repository: "https://github.com/techlabs/notification-system"
  maintainer:
    name: "Equipo Backend"
    email: "backend@techlabs.dev"
  license: "MIT"
  versioning_scheme: "semver"
  created_at: "2025-10-08"
  last_updated_by: "Kiro Configurator"
  tags:
    - "backend"
    - "typescript"
    - "jest"
    - "documentation"
    - "api"

# ==========================================================
# 🧠 COMPORTAMIENTO GENERAL DE LA IA
# ==========================================================
ai:
  role: "asistente técnico experto en ingeniería de software"
  objective: >
    Mantener coherencia lingüística y técnica en toda la documentación,
    código fuente, pruebas y comunicación interna.
  language:
    primary: "español"
    allow_english_terms: true
    english_terms_in_parentheses: true
  tone: "profesional, claro y accesible"
  enforce_consistency: true
  generate_explanations_with_examples: true
  auto_check_documentation_folder: true

# ==========================================================
# 💬 CONFIGURACIÓN DE IDIOMA Y COMUNICACIÓN
# ==========================================================
communication:
  responses_language: "español"
  documentation_language: "español"
  code_comments_language: "español"
  commit_messages_language: "español"
  code_identifiers_language: "inglés"
  style_guide:
    - "Priorizar claridad sobre brevedad"
    - "Usar ejemplos prácticos siempre que sea posible"
    - "Incluir terminología en inglés entre paréntesis cuando sea relevante"

# ==========================================================
# 💻 CONVENCIONES DE CÓDIGO
# ==========================================================
code_conventions:
  naming:
    variables: "camelCase"
    functions: "camelCase"
    classes: "PascalCase"
    files: "kebab-case"
  documentation_standard: "Markdown (README.md)"
  enforce_in_generation: true
  examples:
    - name: "Ejemplo correcto"
      code: |
        // Servicio que envía notificaciones por correo electrónico
        function sendEmailNotification(userEmail: string, message: string): void {
          // Implementación aquí...
        }

# ==========================================================
# 📘 DOCUMENTACIÓN TÉCNICA
# ==========================================================
documentation:
  root: "docs/"
  exclude: ["tasks.md"]
  required_when:
    - "Se crea un nuevo servicio"
    - "Se integra una API externa"
  naming_convention: "[numero-tarea]-[descripcion-kebab-case]-README.md"
  examples:
    - "8-2-notification-system-README.md"
    - "8-2-notification-api-README.md"
  structure:
    main:
      required_sections:
        - "Descripción general  (basados en documentación de proyecto)."
        - "Arquitectura y componentes"
        - "Configuración"
        - "Ejemplos de uso"
    api:
      required_sections:
        - "Endpoints con ejemplos 
        - "Parámetros y respuestas (definidos en PRD o diseño técnico)."
        - "Códigos de error y soluciones (según definición del sistema)."
        - "Integraciones y entornos (basados en documentación de proyecto)."
        - "Variables de entorno (tomadas de requerimientos o diseño)."
  clarity_over_brevity: true
  auto_generate_index: true
  include_diagrams: true

# ==========================================================
# 🧾 ARCHIVO DE TAREAS (tasks.md)
# ==========================================================
tasks:
  filename: "tasks.md"
  allowed_content:
    - "estado de la tarea"
    - "referencia a documentación"
  disallowed_content:
    - "detalles de implementación"
    - "fragmentos de código"
  example_entry: |
    - [x] 8.2 Implementar notificaciones automáticas
      - API documentada en docs/8-2-notification-*-README.md
      - _Requisitos: 12.1, 12.2, 12.3_

# ==========================================================
# 🧪 TESTING Y JEST
# ==========================================================
testing:
  framework: "jest"
  folder: "tests/"
  disallowed_imports:
    - "node:test"
  reference_header: |
    /// <reference types="jest" />
    // IMPORTANTE: NO IMPORTAR FUNCIONES DE 'node:test'
    // Jest proporciona describe, it, expect, beforeEach, afterEach globalmente
  prevent_autofix_comment: |
    // ⚠️ NO USAR el autofix de Kiro IDE en archivos de test
    // Puede generar importaciones erróneas desde 'node:test'
  forbidden_locations:
    - "src/"
  reason: "Separar código de producción de las pruebas unitarias"
  example_structure: |
    proyecto/
    ├── src/
    │   └── services/
    └── tests/
        ├── email.service.test.ts
        └── setup.ts

# ==========================================================
# ⚠️ AUTOFIX DE KIRO IDE
# ==========================================================
autofix:
  allow: false
  watch_for:
    - "importaciones incorrectas de node:test"
    - "errores de tipos con Jest"
  auto_remove_on_detect: true
  recovery_steps:
    - "Eliminar las importaciones erróneas"
    - "Recrear el archivo si persiste el error"
  on_detect_action: "alertar al usuario y sugerir regenerar archivo"

# ==========================================================
# 🪶 ERRORES Y LOGS
# ==========================================================
error_handling:
  messages_language: "español"
  logs_language: "inglés"
  rules:
    - "Mensajes de error deben ser claros y en español"
    - "Logs de desarrollo pueden mantenerse en inglés por compatibilidad"
    - "Evitar mensajes genéricos como 'Error desconocido'"

# ==========================================================
# 💡 RECOMENDACIONES ADICIONALES
# ==========================================================
recommendations:
  - "Usar español en toda la comunicación humana (documentación, commits, comentarios)."
  - "Mantener consistencia terminológica entre servicios y módulos."
  - "Agregar ejemplos funcionales en cada documentación de API."
  - "Verificar que la IA respete la estructura de carpetas antes de generar archivos."
  - "Evitar automatismos que alteren la ubicación o el nombre de los tests."
  - "Validar los nombres de archivos antes de hacer commit."
  - "Usar commits cortos y descriptivos, máximo 80 caracteres."
  - "Revisar ortografía técnica antes de generar documentación automática."
